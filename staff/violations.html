<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/logo/smartsakaylogo.png">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Violations</title>
</head>
<body>

    <div class="dashboard-shell">
        <div id="sidebar-placeholder"></div>
        <div id="topbar-placeholder"></div>

        <main class="main-content">
            <div class="page-header mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">Violations</h1>
                    <p class="page-subtitle">Track and manage driver violations</p>
                </div>
                <div>
                    <button class="btn btn-primary-action" style="width: 144px;" id="btnAddViolation"><i class="bi bi-plus-lg me-2"></i>Add Violation</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card p-3 rounded-4 mb-4 border-0 shadow-sm">
                <div class="row g-2 align-items-center">
                    <div class="col-md-3">
                        <input type="text" id="violationSearch" class="form-control" placeholder="Search driver or violation...">
                    </div>
                    <div class="col-md-2">
                        <select id="filterSeverity" class="form-select">
                            <option value="">All Severities</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table mb-0 align-middle custom-table">
                        <thead>
                            <tr class="text-center">
                                <th>ID</th>
                                <th>Date/Time</th>
                                <th>Driver</th>
                                <th>Trip ID</th>
                                <th>Violation</th>
                                <th>Severity</th>
                                <th>Penalty</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="violationsTableBody">
                            <tr><td colspan="8" class="text-center py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Add/Edit Violation Modal -->
    <div class="modal fade" id="violationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content smart-modal">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="violationModalTitle">Add Violation</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="violationEditId">
                    <div class="mb-3">
                        <label class="form-label">Driver ID</label>
                        <input type="number" id="violDriverId" class="form-control" placeholder="Required" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trip ID</label>
                        <input type="text" id="violTripId" class="form-control" placeholder="e.g. T-001 (Optional)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Violation Type</label>
                        <input type="text" id="violType" class="form-control" placeholder="e.g. Over-speeding" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="violDesc" class="form-control" rows="3" placeholder="Provide details"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Severity</label>
                            <select id="violSeverity" class="form-select">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Penalty Amount (₱)</label>
                            <input type="number" step="0.01" id="violPenalty" class="form-control" placeholder="0.00">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-action" onclick="saveViolation()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/auth.js"></script>
    <script>
        checkAuth('staff');
    </script>
    <script src="../scripts/main.js"></script>
    <script>
        let violationsData = [];

        function loadViolations() {
            $.ajax({
                url: '../api/violations.php',
                method: 'GET',
                dataType: 'json',
                success: function(data) {
                    violationsData = data;
                    renderViolations(data);
                },
                error: function(err) {
                    console.error("Failed to fetch violations:", err);
                }
            });
        }

        function renderViolations(data) {
            if (data.length === 0) {
                $('#violationsTableBody').html('<tr><td colspan="8" class="text-center text-muted py-4">No violations found.</td></tr>');
                return;
            }

            const rows = data.map(v => {
                let sevBadge = 'status-badge ';
                if (v.severity === 'Low') sevBadge += 'active'; // Greenish
                else if (v.severity === 'Medium') sevBadge += 'on-leave'; // Orange/Yellow
                else if (v.severity === 'High') sevBadge += 'inactive'; // Red

                return `
                    <tr class="text-center">
                        <td class="fw-mono" style="font-family: 'DM Mono', monospace">${v.id}</td>
                        <td class="fw-mono" style="font-size: 0.85rem; font-family: 'DM Mono', monospace">${v.created_at}</td>
                        <td>${v.driver || '-'}</td>
                        <td style="font-family: 'DM Mono', monospace; color: var(--primary)">${v.trip || '-'}</td>
                        <td><strong>${v.type}</strong><br><small>${v.description}</small></td>
                        <td><span class="${sevBadge}">${v.severity}</span></td>
                        <td class="fw-mono" style="font-family: 'DM Mono', monospace">₱${parseFloat(v.penalty).toFixed(2)}</td>
                        <td>
                            <button class="btn btn-tbl btn-tbl-edit" onclick="editViolation(${v.id})"><i class="bi bi-pencil-fill"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
            $('#violationsTableBody').html(rows);
        }

        function applyFilters() {
            const q = $('#violationSearch').val().toLowerCase();
            const severity = $('#filterSeverity').val();

            const filtered = violationsData.filter(v => {
                const matchSev = !severity || v.severity === severity;
                const matchQ = !q || (v.driver && v.driver.toLowerCase().includes(q)) || (v.type && v.type.toLowerCase().includes(q));
                return matchSev && matchQ;
            });
            renderViolations(filtered);
        }

        $('#violationSearch, #filterSeverity').on('input change', applyFilters);

        $('#btnAddViolation').click(function() {
            $('#violationModalTitle').text('Add Violation');
            $('#violationEditId').val('');
            $('#violDriverId').val('');
            $('#violTripId').val('');
            $('#violType').val('');
            $('#violDesc').val('');
            $('#violSeverity').val('Low');
            $('#violPenalty').val('0.00');
            new bootstrap.Modal(document.getElementById('violationModal')).show();
        });

        function editViolation(id) {
            const v = violationsData.find(x => x.id == id);
            if (!v) return;
            $('#violationModalTitle').text('Edit Violation');
            $('#violationEditId').val(v.id);
            // Driver ID isn't returned natively because of JOIN. We should just show it empty for safety or fetch properly.
            $('#violDriverId').val('');
            $('#violTripId').val(v.trip || '');
            $('#violType').val(v.type || '');
            $('#violDesc').val(v.description || '');
            $('#violSeverity').val(v.severity || 'Low');
            $('#violPenalty').val(v.penalty || '0.00');
            new bootstrap.Modal(document.getElementById('violationModal')).show();
        }

        function saveViolation() {
            const data = {
                id: $('#violationEditId').val(),
                driver_id: $('#violDriverId').val(),
                trip_id: $('#violTripId').val(),
                type: $('#violType').val(),
                description: $('#violDesc').val(),
                severity: $('#violSeverity').val(),
                penalty: $('#violPenalty').val()
            };

            if (!data.driver_id || !data.type) {
                alert("Driver ID and Violation Type are required.");
                return;
            }

            $.post('../api/save-violation.php', data, function(res) {
                alert(res);
                bootstrap.Modal.getInstance(document.getElementById('violationModal')).hide();
                loadViolations();
            });
        }

        $(function() {
            loadViolations();
        });
    </script>
</body>
</html>
