<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Dashboard</title>
</head>
<body>

    <div class="dashboard-shell">
        <!-- Sidebar loaded -->
        <div id="sidebar-placeholder"></div>
        <!-- Topbar loaded -->
        <div id="topbar-placeholder"></div>

        <!-- Main content starts here -->
        <main class="main-content">
            <div class="page-header mb-3">
                <h1 class="page-title">Staff Dashboard</h1>
                <p class="page-subtitle">Overview of Compliance & Operations</p>
            </div>

            <!-- Stat cards -->
             <div class="row g-4 mb-4">
                <div class="col-xl-4 col-md-6">
                    <div class="card stat-card stat-card--secondary rounded-4">
                        <div class="card-body">
                            <div class="stat-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                            <div class="stat-body d-flex flex-column">
                                <span class="stat-value" id="complaintsCount">0</span>
                                <span class="stat-label">Pending Complaints</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6">
                    <div class="card stat-card stat-card--primary rounded-4">
                        <div class="card-body">
                            <div class="stat-icon"><i class="bi bi-shield-fill-x"></i></div>
                            <div class="stat-body d-flex flex-column">
                                <span class="stat-value" id="violationsCount">0</span>
                                <span class="stat-label">Total Violations</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6">
                    <div class="card stat-card stat-card--success rounded-4">
                        <div class="card-body">
                            <div class="stat-icon"><i class="bi bi-map-fill"></i></div>
                            <div class="stat-body d-flex flex-column">
                                <span class="stat-value" id="tripsCount">0</span>
                                <span class="stat-label">Active Trips</span>
                            </div>
                        </div>
                    </div>
                </div>
             </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/auth.js"></script>
    <script>
        // Protect this page
        checkAuth('staff');
    </script>
    <script src="../scripts/main.js"></script>
    <script>
        $(document).ready(function() {
            $.ajax({
                url: '../api/staff-dashboard.php',
                method: 'GET',
                dataType: 'json',
                success: function(res) {
                    $('#complaintsCount').text(res.complaints || 0);
                    $('#violationsCount').text(res.violations || 0);
                    $('#tripsCount').text(res.active_trips || 0);
                },
                error: function(err) {
                    console.error("Failed to load staff dashboard stats", err);
                }
            });
        });
    </script>
</body>
</html>
