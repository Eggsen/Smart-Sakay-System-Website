<header class="topbar d-flex justify-content-between align-items-center">
    <div class="topbar-left">
        <button class="btn-sidebar-toggle" type="button" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <div class="page">
            <span>Dashboard</span>
        </div>
    </div>

    <div class="topbar-right">
        <div class="realtime-indicator">
            <span class="pulse-dot"></span>
            <span>Live Monitoring</span>
        </div>
        <div class="topbar-date" id="topbarDate"></div>
        <div class="user-profile-chip d-flex align-items-center gap-2 ms-2">
            <div class="avatar-circle">
                <i class="bi bi-person-fill"></i>
            </div>
            <div class="user-profile-info d-flex flex-column justify-content-center">
                <span class="user-name" id="topbarUserName">Staff</span>
                <span class="user-role text-uppercase" id="topbarUserRole">Staff</span>
            </div>
        </div>
    </div>
</header>
