<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Passenger Logs</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

    <!-- Main content starts here -->
    <main class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center mb-4">
            <div class="left-header">
                <h1 class="page-title">Passenger Flow Logs</h1>
                <p class="page-subtitle">All boarding and drop-off events</p>
            </div>
            <div class="right-header d-flex gap-3">
                <select class="form-select form-select-sm filter-select" name="" id="">
                    <option value="">All Actions</option>
                    <option value="Board">Board</option>
                    <option value="Drop">Drop</option>
                </select>
                <select class="form-select filter-select" name="" id="">
                    <option value="">All Types</option>
                    <option value="Student">Board</option>
                    <option value="Regular">Regular</option>
                    <option value="Senior">Senior Citizen</option>
                </select>
            </div>
        </div>
        <!-- Table starts here -->
        <div class="table-card">
            <table class="table smart-table">
                <thead>
                    <tr>
                        <th>TIME STAMP</th>
                        <th>TRIP ID</th>
                        <th>PASSENGER TYPE</th>
                        <th>ACTION</th>
                        <th>QUANTITY</th>
                        <th>STOP</th>
                        <th>PAYMENT</th>
                    </tr>
                </thead>    
                <tbody>
                    <!-- Table content here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="/scripts/main.js"></script>
</body>
</html>
