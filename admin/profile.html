<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/logo/smartsakaylogo.png">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Profile</title>
</head>
<body>

    <div class="dashboard-shell">
        <!-- Sidebar loaded -->
        <div id="sidebar-placeholder"></div>
        <!-- Topbar loaded -->
        <div id="topbar-placeholder"></div>

        <!-- Main content starts here -->
        <main class="main-content">
            <div class="page-header mb-4">
                <h1 class="page-title">My Profile</h1>
                <p class="page-subtitle">Personal information and account settings</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-7">
                    <div class="profile-card">
                        <div class="profile-header-bg"></div>
                        <div class="card-body p-4 p-sm-5 d-block text-center text-sm-start">
                            <div class="profile-avatar-container d-flex justify-content-center justify-content-sm-start">
                                <div class="profile-avatar" id="profileAvatar">
                                    <i class="bi bi-person-circle"></i>
                                </div>
                            </div>
                            
                            <div class="row mt-4">
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Full Name</div>
                                    <div class="profile-field-value" id="profileFullName">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Username</div>
                                    <div class="profile-field-value text-secondary" id="profileUsername">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Email Address</div>
                                    <div class="profile-field-value" id="profileEmail">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Contact Number</div>
                                    <div class="profile-field-value" id="profileContact">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">System Role</div>
                                    <div class="profile-field-value">
                                        <span class="profile-meta-badge" id="profileRole">
                                            <i class="bi bi-shield-lock-fill"></i>
                                            <span>Loading...</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Account Created At</div>
                                    <div class="profile-field-value fw-mono" id="profileCreatedAt">Loading...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
    <script>
        $(document).ready(function() {
            const userId = localStorage.getItem('userId');
            const userRole = localStorage.getItem('userRole') || 'admin';
            const userName = localStorage.getItem('userName');

            // Set active page in sidebar via data-page if manual override needed
            const loadProfile = () => {
                $.ajax({
                    url: '../api/profile.php',
                    method: 'GET',
                    data: {
                        id: userId,
                        role: userRole,
                        name: userName
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.success && response.user) {
                            const u = response.user;
                            $('#profileFullName').text(u.full_name || 'N/A');
                            $('#profileUsername').text(u.username || 'N/A');
                            $('#profileEmail').text(u.email || 'N/A');
                            $('#profileContact').text(u.contact_number || 'N/A');
                            
                            // Role/Status Badge
                            const roleText = u.role || u.status || userRole;
                            $('#profileRole span').text(roleText.toUpperCase());
                            
                            if (roleText.toLowerCase() === 'admin' || roleText.toLowerCase().includes('admin')) {
                                $('#profileRole').css({ 'background': 'var(--success-pale)', 'color': 'var(--success)', 'border-color': 'rgba(46,204,113,0.12)' });
                                $('#profileRole i').removeClass('bi-person-fill').addClass('bi-shield-lock-fill');
                            } else {
                                $('#profileRole').css({ 'background': 'var(--secondary-pale)', 'color': 'var(--secondary)', 'border-color': 'rgba(11,72,111,0.08)' });
                                $('#profileRole i').removeClass('bi-shield-lock-fill').addClass('bi-person-fill');
                            }

                            // Created at date
                            if (u.created_at) {
                                const dt = new Date(u.created_at);
                                $('#profileCreatedAt').text(dt.toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }));
                            } else {
                                $('#profileCreatedAt').text('N/A');
                            }
                        } else {
                            // Render generic fallback info
                            $('#profileFullName').text(userName || 'User');
                            $('#profileRole span').text(userRole.toUpperCase());
                            $('#profileUsername').text('N/A');
                            $('#profileEmail').text('N/A');
                            $('#profileContact').text('N/A');
                            $('#profileCreatedAt').text('N/A');
                        }
                    },
                    error: function() {
                        // Render generic fallback info
                        $('#profileFullName').text(userName || 'User');
                        $('#profileRole span').text(userRole.toUpperCase());
                        $('#profileUsername').text('N/A');
                        $('#profileEmail').text('N/A');
                        $('#profileContact').text('N/A');
                        $('#profileCreatedAt').text('N/A');
                    }
                });
            };

            loadProfile();
        });
    </script>
</body>
</html>
