<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/logo/smartsakaylogo.png">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Profile</title>
</head>
<body>

    <div class="dashboard-shell">
        <!-- Sidebar loaded -->
        <div id="sidebar-placeholder"></div>
        <!-- Topbar loaded -->
        <div id="topbar-placeholder"></div>

        <!-- Main content starts here -->
        <main class="main-content">
            <div class="page-header mb-4">
                <h1 class="page-title">My Profile</h1>
                <p class="page-subtitle">Personal information and account settings</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-7">
                    <div class="profile-card">
                        <div class="profile-header-bg"></div>
                        <div class="card-body p-4 p-sm-5 d-block text-center text-sm-start">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="profile-avatar-container mb-0">
                                    <div class="profile-avatar" id="profileAvatar">
                                        <i class="bi bi-person-circle"></i>
                                    </div>
                                </div>
                                <div id="profileActions">
                                    <div id="viewActions">
                                        <button class="btn btn-primary-action" id="btnEditProfile">
                                            <i class="bi bi-pencil-square me-1"></i> Edit Profile
                                        </button>
                                    </div>
                                    <div id="editActions" class="d-none gap-2">
                                        <button class="btn btn-success" id="btnSaveProfile" style="border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 700;">
                                            <i class="bi bi-check-lg me-1"></i> Save
                                        </button>
                                        <button class="btn btn-outline-secondary" id="btnCancelEdit" style="border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 700;">
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row mt-4" id="profileFieldsContainer">
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Full Name</div>
                                    <div class="profile-field-value" id="profileFullName">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Username</div>
                                    <div class="profile-field-value text-secondary" id="profileUsername">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Email Address</div>
                                    <div class="profile-field-value" id="profileEmail">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Contact Number</div>
                                    <div class="profile-field-value" id="profileContact">Loading...</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">System Role</div>
                                    <div class="profile-field-value">
                                        <span class="profile-meta-badge" id="profileRole">
                                            <i class="bi bi-shield-lock-fill"></i>
                                            <span>Loading...</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="profile-field-label">Account Created At</div>
                                    <div class="profile-field-value fw-mono" id="profileCreatedAt">Loading...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
    <script>
        $(document).ready(function() {
            const userId = localStorage.getItem('userId');
            const userRole = localStorage.getItem('userRole') || 'admin';
            let currentUserData = {};

            const loadProfile = () => {
                $.ajax({
                    url: '../api/profile.php',
                    method: 'GET',
                    data: { id: userId, role: userRole },
                    dataType: 'json',
                    success: function(response) {
                        if (response.success && response.user) {
                            currentUserData = response.user;
                            renderProfile(currentUserData);
                        }
                    }
                });
            };

            const renderProfile = (u) => {
                $('#profileFullName').text(u.full_name || 'N/A');
                $('#profileUsername').text(u.username || 'N/A');
                $('#profileEmail').text(u.email || 'N/A');
                $('#profileContact').text(u.contact_number || 'N/A');
                
                const roleText = u.role || u.status || userRole;
                $('#profileRole span').text(roleText.toUpperCase());
                
                if (u.created_at) {
                    const dt = new Date(u.created_at);
                    $('#profileCreatedAt').text(dt.toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }));
                }
            };

            $('#btnEditProfile').on('click', function() {
                $('#viewActions').addClass('d-none');
                $('#editActions').removeClass('d-none').addClass('d-flex');

                // Convert text to inputs
                $('#profileFullName').html(`<input type="text" class="form-control form-control-sm" id="editFullName" value="${currentUserData.full_name || ''}">`);
                $('#profileUsername').html(`<input type="text" class="form-control form-control-sm" id="editUsername" value="${currentUserData.username || ''}">`);
                $('#profileEmail').html(`<input type="email" class="form-control form-control-sm" id="editEmail" value="${currentUserData.email || ''}">`);
                $('#profileContact').html(`<input type="text" class="form-control form-control-sm" id="editContact" value="${currentUserData.contact_number || ''}">`);
            });

            $('#btnCancelEdit').on('click', function() {
                $('#editActions').addClass('d-none').removeClass('d-flex');
                $('#viewActions').removeClass('d-none');
                renderProfile(currentUserData);
            });

            $('#btnSaveProfile').on('click', function() {
                const newData = {
                    id: userId,
                    role: userRole,
                    full_name: $('#editFullName').val().trim(),
                    username: $('#editUsername').val().trim(),
                    email: $('#editEmail').val().trim(),
                    contact_number: $('#editContact').val().trim()
                };

                if (!newData.full_name || !newData.username || !newData.email) {
                    alert("Please fill in all required fields.");
                    return;
                }

                const $btn = $(this);
                $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Saving...');

                $.ajax({
                    url: '../api/update-profile.php',
                    method: 'POST',
                    data: newData,
                    dataType: 'json',
                    success: function(res) {
                        $btn.prop('disabled', false).html('<i class="bi bi-check-lg me-1"></i> Save');
                        if (res.success) {
                            currentUserData = { ...currentUserData, ...newData };
                            localStorage.setItem('userName', newData.full_name);
                            
                            // Update UI elements that use the name
                            const topbarName = document.querySelector('#topbarUserName');
                            if (topbarName) topbarName.textContent = newData.full_name;

                            $('#editActions').addClass('d-none').removeClass('d-flex');
                            $('#viewActions').removeClass('d-none');
                            renderProfile(currentUserData);
                            alert(res.message);
                        } else {
                            alert(res.message);
                        }
                    },
                    error: function() {
                        $btn.prop('disabled', false).html('<i class="bi bi-check-lg me-1"></i> Save');
                        alert("An error occurred while saving. Please try again.");
                    }
                });
            });

            loadProfile();
        });
    </script>
</body>
</html>
