<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Vehicles</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

     <!-- Main content starts here -->
    <main class="main-content">
            <div class="page-header mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">Vehicle Management</h1>
                <p class="page-subtitle">Registered transport vehicles</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="input-group" style="min-width:280px">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input class="form-control" type="search" id="vehicleSearchInput" placeholder="Search plate no. or ID">
                </div>

                <select id="filterVehicleStatus" class="form-select" style="width:150px">
                    <option value="">All Status</option>
                </select>

                <select id="filterVehicleType" class="form-select" style="width:150px">
                    <option value="">All Type</option>
                </select>
            </div>
        </div>

        <div class="table-card">
            <table class="table table-stripped smart-table">
                <thead>
                    <tr class="text-center">
                        <th>#</th>
                        <th>PLATE NO.</th>
                        <th>TYPE</th>
                        <th>CAPACITY</th>
                        <th>COLOR MARKINGS</th>
                        <th>STATUS</th>
                        <th>CREATED AT</th>
                    </tr>
                </thead>
                <tbody id="vehiclesTableBody">
                    <!-- Table contents will be here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
