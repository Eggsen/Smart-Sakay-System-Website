<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Reports</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

    <!-- Main content start here -->
    <main class="main-content">
        <div class="page-header mb-4">
            <h1 class="page-title">Daily Reports</h1>
            <p class="page-subtitle">Transportation summary and analytics</p>
        </div>

        <!-- Summary cards -->
        <div class="row g-3 mb-4">
            <div class="col-xl-4 col-sm-6">
                <div class="card report-card">
                    <div class="card-body report-body">
                        <div class="report-icon"><i class="bi bi-people-fill"></i></div>
                        <span class="report-value" id="rpt-passengers">—</span>
                        <span class="report-subtitle">Total Passengers</span>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-sm-6">
                <div class="card report-card">
                    <div class="card-body report-body">
                        <div class="report-icon"><i class="bi bi-cash-stack"></i></div>
                        <span class="report-value" id="rpt-revenue">—</span>
                        <span class="report-subtitle">Total Revenue</span>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-sm-6">
                <div class="card report-card">
                    <div class="card-body report-body">
                        <div class="report-icon"><i class="bi bi-map-fill"></i></div>
                        <span class="report-value" id="rpt-trips">—</span>
                        <span class="report-subtitle">Total Trips</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-4">
            <div class="col-xl-7">
                <div class="chart-card">
                    <div class="chart-header">
                        <div>
                            <div class="chart-title">Revenue by Route</div>
                            <div class="chart-sub">Total fare collected per route</div>
                        </div>
                    </div>
                    <canvas id="revenueChart" height="120"></canvas>
                </div>
            </div>
            <div class="col-xl-5">
                <div class="chart-card">
                    <div class="chart-header">
                        <div>
                            <div class="chart-title">Trips per Route</div>
                            <div class="chart-sub">Distribution of trips across routes</div>
                        </div>
                    </div>
                    <canvas id="tripsRouteChart" height="160"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/reports.js"></script>
</body>
</html>
