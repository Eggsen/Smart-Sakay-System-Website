<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Fare Policy</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

    <!-- Main content starts here -->
    <main class="main-content">
        <div class="page-header mb-4">
            <h1 class="page-title">Fare Policy</h1>
            <p class="page-subtitle">Base fare and discount configuration</p>
        </div>

        <!-- Fare policy card -->
        <div class="fare-card-container">
            <div class="card fare-policy-card rounded-4">
                <div class="card-header rounded-top-4 px-4 py-3">
                    <i class="bi bi-cash-coin me-2"></i>
                    <span>Current fare matrix</span>
                </div>
                <div class="card-body p-4 d-flex flex-column align-items-center">
                    <div class="row g-3">
                        <div class="col-xl-4 col-sm-6">
                            <div class="card fare-card fare-card-student">
                                <div class="passenger-icon">
                                    <img src="/assets/icons/icons8-student-48.png" alt="">
                                </div>
                                <span class="passenger-type-fare">Student</span>
                                <span class="fare-value">&#8369; 0</span>
                            </div>
                        </div>
                        <div class="col-xl-4 col-sm-6">
                            <div class="card fare-card fare-card-regular">
                                <div class="passenger-icon">
                                    <img src="/assets/icons/icons8-teenager-male-48.png" alt="">
                                </div>
                                <span class="passenger-type-fare">Regular</span>
                                <span class="fare-value">&#8369; 0</span>
                            </div>
                        </div>
                        <div class="col-xl-4 col-sm-6">
                            <div class="card fare-card fare-card-senior">
                               <div class="passenger-icon">
                                    <img src="/assets/icons/icons8-old-woman-48.png" alt="">
                                </div>
                                <span class="passenger-type-fare">Senior Citizen</span>
                                <span class="fare-value">&#8369; 0</span>
                            </div>
                        </div>
                    </div>
                    <div class="edit-btn-box mt-2">
                        <button class="btn btn-lg edit-fare-btn text-white"><i class="bi bi-pen-fill mx-3"></i>Edit Fare Policy</button>
                    </div>
                </div>
                <div class="card-footer px-4 py-3">
                    <i class="bi bi-info-circle-fill info-icon me-2"></i>
                    <span>Fare rates apply to all registered routes. Senior Citizens and Students are given discounted rates per LTFRB guidelines.</span>
                </div>
            </div>
        </div>

    </main>

    <script src="../scripts/main.js"></script>
</body>
</html>
