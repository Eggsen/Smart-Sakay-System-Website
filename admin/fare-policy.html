<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Fare Policy</title>
    <style>
        /* Grouped fares UI */
        .fare-group { margin-bottom: 1rem; border: 1px solid #e9ecef; border-radius: 8px; }
        .fare-group-header { background:#f8f9fa; padding: .6rem .9rem; border-bottom:1px solid #e9ecef; display:flex; justify-content:space-between; align-items:center; }
        .fare-item { padding: .6rem .9rem; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #fff; }
        .fare-item .fare-to { flex:1; }
        .fare-item .fare-values { white-space:nowrap; margin-left: 1rem; }
        .fare-actions button { margin-left: .5rem; }
        .fare-empty { padding:1rem; color:#6c757d; }
    </style>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>
    
    <!-- Main content starts here -->
    <main class="main-content">
    
        <!-- Page Header -->
        <div class="page-header d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 class="page-title">Fare Policy</h1>
                <p class="page-subtitle">Base fare and discount configuration</p>
            </div>
            <div class="d-flex gap-2">
                <button id="addFareBtn" class="btn btn-primary-action" data-bs-toggle="modal" data-bs-target="#fareModal">
                    <i class="bi bi-plus-lg me-1"></i>Add Fare
                </button>
                <select id="routeFilter" class="form-select" style="width:140px">
                    <option value="">-- All Routes --</option>
                    <!-- Filled by fare.js → loadRoutes() -->
                </select>
            </div>
        </div>
    
        <!-- Fare Matrix Card (dynamic) -->
        <div class="card rounded-4 mb-4">
            <div class="card-header rounded-top-4 py-3 px-4 d-flex justify-content-between align-items-center">
                <div>
                    <i class="bi bi-cash-coin me-2"></i>
                    <strong>Fare Matrix</strong>
                </div>
            </div>
            <div class="card-body">
                <div id="fareMatrixContainer">
                    <!-- JS will render route cards here -->
                    <div class="text-muted text-center py-4" id="fareLoading">Loading fares...</div>
                </div>
            </div>
        </div>
    
    </main>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
