<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Routes</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

    <!-- Main content starts here -->
    <main class="main-content">
        <div class="page-header mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">Routes & Stops</h1>
                <p class="page-subtitle">Manage transport routes and waypoints</p>
            </div>
            <button class="btn btn-primary-action" onclick="openRouteModal()">
                <i class="bi bi-plus-lg"></i> Add Route
            </button>
        </div>

        <!-- Route cards -->
        <div class="row g-4" id="routesContainer">
            <!-- Content will be here -->
        </div>

        <!-- Route Modal -->
        <div class="modal fade" id="routeModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content smart-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="routeModalTitle">Add Route</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="routeEditId"/>
                        <div class="mb-3">
                        <label class="form-label">Route Name</label>
                        <input type="text" class="form-control smart-input" id="routeName" placeholder="e.g. Cogon Market — Bulua Terminal"/>
                        </div>
                        <div class="mb-3">
                        <label class="form-label">Stops <span class="text-muted small">(comma-separated)</span></label>
                        <textarea class="form-control smart-input" id="routeStops" rows="3" placeholder="e.g. Cogon Market, Limketkai, Gaisano, Bulua Terminal"></textarea>
                        </div>
                        <div class="mb-3">
                        <label class="form-label">Distance (km)</label>
                        <input type="number" class="form-control smart-input" id="routeDistance" placeholder="e.g. 8.5"/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn-save" onclick="saveRoute()">Save Route</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Delete confirmation modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content smart-modal">
                    <div class="modal-body text-center py-4">
                        <div class="delete-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                        <div class="delete-title">Confirm Delete</div>
                        <div class="delete-msg" id="deleteMsg">Are you sure you want to delete this record?</div>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn-delete-confirm" id="deleteConfirmBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
