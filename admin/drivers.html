<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Drivers</title>
</head>
<body>
    
    <!-- Sidebar loaded -->
    <div id="sidebar-placeholder"></div>
    <!-- Topbar loaded -->
    <div id="topbar-placeholder"></div>

     <!-- Main content starts here -->
    <main class="main-content">
        <div class="page-header mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">Driver Management</h1>
                <p class="page-subtitle">Registered drivers in the system</p>
            </div>
            <button class="btn btn-primary-action" id="btnAddDriver">
                <i class="bi bi-plus-lg"></i> Add Driver
            </button>
        </div>

        <div class="table-card">
            <table class="table table-stripped smart-table">
                <thead class="text-center">
                    <tr>
                        <th>#</th>
                        <th>NAME</th>
                        <th>LICENSE NO.</th>
                        <th>CONTACT</th>
                        <th>STATUS</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="driversTableBody">
                    <!-- Table contents will be here -->
                </tbody>
            </table>
        </div>
        <!-- ============================================================
             MODALS
        ============================================================ -->
        
        <!-- Driver Modal -->
        <div class="modal fade" id="driverModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content smart-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="driverModalTitle">Add Driver</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="driverEditId" />
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control smart-input" id="driverName"
                                placeholder="e.g. Juan Dela Cruz" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">License Number</label>
                            <input type="text" class="form-control smart-input" id="driverLicense"
                                placeholder="e.g. B01-23-456789" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control smart-input" id="driverContact" placeholder="09XXXXXXXXX" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select smart-input" id="driverStatus">
                                <option>Active</option>
                                <option>Inactive</option>
                                <option>On Leave</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn-save" onclick="saveDriver()">Save Driver</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Delete confirmation modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content smart-modal">
                    <div class="modal-body text-center py-4">
                        <div class="delete-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                        <div class="delete-title">Confirm Delete</div>
                        <div class="delete-msg" id="deleteMsg">Are you sure you want to delete this record?</div>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn-delete-confirm" id="deleteConfirmBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/main.js"></script>
</body>
</html>
