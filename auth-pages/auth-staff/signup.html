<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../assets/logo/smartsakaylogo.png">
    <link rel="stylesheet" href="../../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../auth-page-style/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Smart Sakay - Staff Registration</title>
</head>
<body>
    
    <!-- Auth card (wider for signup) -->
    <div class="auth-card auth-card--signup card rounded-4 d-flex">
        <div class="row">
            <div class="left-side left-side--signup col-xl-6 col-sm-12 card-body p-5">
                <div class="header d-flex align-items-center mb-4">
                    <div class="logo-box d-flex align-items-center gap-2">
                        <img src="../../assets/logo/smartsakaylogo.png" alt="">
                        <span>Smart Sakay</span>
                    </div>
                </div>
                <div class="title mb-3 text-center">Register as <span>Staff</span></div>

                <!-- Inline alert notification -->
                <div id="staffSignupAlert" class="alert auth-alert auth-alert--hidden" role="alert"></div>

                <form id="staffSignupForm" class="d-flex flex-column gap-2">
                    <div class="row g-2">
                        <div class="col-6">
                            <label for="staffFirstName">First Name</label>
                            <input id="staffFirstName" class="form-control" type="text" placeholder="First name" required>
                        </div>
                        <div class="col-6">
                            <label for="staffLastName">Last Name</label>
                            <input id="staffLastName" class="form-control" type="text" placeholder="Last name" required>
                        </div>
                    </div>
                    <label for="staffRegUsername">Username <span class="text-danger">*</span></label>
                    <input id="staffRegUsername" class="form-control" type="text" placeholder="Choose a unique username" required>
                    <label for="staffEmail">Email Address</label>
                    <input id="staffEmail" class="form-control" type="email" placeholder="Enter email address" required>
                    <label for="staffContact">Contact Number</label>
                    <input id="staffContact" class="form-control" type="tel" placeholder="e.g. 09171234567">
                    <label for="staffRegPassword">Password <small class="text-muted fw-normal">(min. 8 characters)</small></label>
                    <div class="input-group">
                        <input id="staffRegPassword" class="form-control" type="password" placeholder="Create a password" required>
                        <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1" data-target="staffRegPassword">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <label for="staffConfirmPassword">Confirm Password</label>
                    <div class="input-group">
                        <input id="staffConfirmPassword" class="form-control" type="password" placeholder="Re-enter your password" required>
                        <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1" data-target="staffConfirmPassword">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <button type="submit" id="staffRegisterBtn" class="btn login-btn w-100 mt-3">Register</button>
                </form>
                <div class="text-center mt-2">Already have an account? <a href="login.html">Sign in</a> </div>
            </div>
            <div class="right-side col-xl-6 d-flex flex-column justify-content-center align-items-center">
                <div class="mockup-img mb-4">
                    <img src="../../assets/images/webiste-mockup.png" alt="">
                </div>
                <div class="subtitle">Check Transportation Data</div>
                <div class="subtitle-2">
                    <i>Accurate, Real-Time and Promotes Transparency!</i>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../scripts/auth.js"></script>
    <script>
        // Password visibility toggle
        $(document).on('click', '.toggle-pw', function () {
            const targetId = $(this).data('target');
            const $input   = $('#' + targetId);
            const $icon    = $(this).find('i');
            if ($input.attr('type') === 'password') {
                $input.attr('type', 'text');
                $icon.removeClass('bi-eye-slash').addClass('bi-eye');
            } else {
                $input.attr('type', 'password');
                $icon.removeClass('bi-eye').addClass('bi-eye-slash');
            }
        });
    </script>
</body>
</html>
