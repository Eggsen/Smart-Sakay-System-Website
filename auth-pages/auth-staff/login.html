<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../auth-page-style/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Smart Sakay - Staff Login</title>
</head>
<body>
    
    <!-- Auth card -->
    <div class="auth-card card rounded-4 d-flex">
        <div class="row">
            <div class="left-side col-xl-6 col-sm-12 card-body p-5">
                <div class="header d-flex justify-content-between align-items-center gap-2 mb-5">
                    <div>
                        <div class="logo-box d-flex align-items-center gap-2">
                            <img src="../../assets/logo/smartsakaylogo.png" alt="">
                            <span>Smart Sakay</span>
                        </div>
                    </div>
                    <a href="../../index.html" class="back-btn text-decoration-none d-flex align-items-center gap-1 text-muted"><i class="bi bi-arrow-return-left text-muted"></i>Previous Page</a>
                </div>
                <div class="title mb-3 text-center">Login as <span>Staff</span></div>

                <!-- Inline alert notification -->
                <div id="staffLoginAlert" class="alert auth-alert auth-alert--hidden" role="alert"></div>

                <form id="staffLoginForm" class="d-flex flex-column gap-2">
                    <label for="staffUsername">Username or Email</label>
                    <input id="staffUsername" class="form-control" type="text" placeholder="Enter username or email" required>
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="staffPassword">Password</label>
                        <a href="../auth-admin/forgot-password.php" class="text-decoration-none" style="font-size:0.82rem;color:var(--primary);font-weight:600;">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <input id="staffPassword" class="form-control" type="password" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1" data-target="staffPassword">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <button type="submit" id="staffLoginBtn" class="btn login-btn w-100 mt-3">Login</button>
                </form>
                <div class="text-center mt-2">Register an account <a href="signup.html">here</a> </div>
            </div>
            <div class="right-side col-xl-6 d-flex flex-column justify-content-center align-items-center">
                <div class="mockup-img mb-4">
                    <img src="../../assets/images/webiste-mockup.png" alt="">
                </div>
                <div class="subtitle">Check Transportation Data</div>
                <div class="subtitle-2">
                    <i>Accurate, Real-Time and Promotes Transparency!</i>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../scripts/auth.js"></script>
    <script>
        // Password visibility toggle
        $(document).on('click', '.toggle-pw', function () {
            const targetId = $(this).data('target');
            const $input   = $('#' + targetId);
            const $icon    = $(this).find('i');
            if ($input.attr('type') === 'password') {
                $input.attr('type', 'text');
                $icon.removeClass('bi-eye-slash').addClass('bi-eye');
            } else {
                $input.attr('type', 'password');
                $icon.removeClass('bi-eye').addClass('bi-eye-slash');
            }
        });
    </script>
</body>
</html>
