<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../auth-page-style/style.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <title>Smart Sakay - Admin Registration</title>
</head>
<body>
    
    <!-- Auth card -->
    <div class="auth-card card rounded-4 d-flex">
        <div class="row">
            <div class="left-side col-xl-6 col-sm-12 card-body p-5">
                <div class="header d-flex align-items-center gap-2 mb-5">
                    <div class="logo-box">
                        <img src="../../assets/logo/smartsakaylogo.png" alt="">
                    </div>
                    <span>Smart Sakay</span>
                </div>
                <div class="title mb-3 text-center">Register an Account</div>
                <form class="d-flex flex-column gap-1" action="login.html">
                    <label for="">LGU ID</label>
                    <input class="form-control" type="text" placeholder="e.g 0123456789" required>
                    <label for="">Password</label>
                    <input class="form-control" type="text" placeholder="Enter password" required>
                    <button class="btn login-btn w-100 mt-3">Register</button>
                </form>
                <div class="text-center mt-2">Already have an LGU account? <a href="login.html">Sign in</a> </div>
            </div>
            <div class="right-side col-xl-6 d-flex flex-column justify-content-center align-items-center">
                <div class="mockup-img mb-4">
                    <img src="../../assets/images/webiste-mockup.png" alt="">
                </div>
                <div class="subtitle">Check Transportation Data</div>
                <div class="subtitle-2">
                    <i>Accurate, Real-Time and Promotes Transparency!</i>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
